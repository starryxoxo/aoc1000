<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worldbox Neural Mind</title>
  <style>
    body { 
      margin: 0; padding: 20px; 
      background: linear-gradient(180deg, #000011 0%, #001100 100%); 
      color: #00ff88; 
      font-family: 'Courier New', monospace; 
      font-size: 13px; 
    }
    #terminal { height: 100vh; display: flex; flex-direction: column; }
    #output { 
      flex: 1; overflow-y: auto; padding: 15px; 
      background: rgba(0,20,0,0.3); 
      backdrop-filter: blur(5px);
    }
    #input-line { 
      display: flex; padding: 15px; 
      background: rgba(0,30,0,0.8); 
      border-top: 2px solid #004400; 
    }
    #prompt { color: #00ff88; font-weight: bold; }
    #input { 
      flex: 1; background: none; border: none; 
      color: #88ff88; font-family: inherit; outline: none; 
    }
    #stats { 
      position: fixed; top: 10px; right: 10px; 
      background: rgba(0,0,0,0.7); padding: 10px; 
      font-size: 11px; border: 1px solid #004400;
    }

    .thought    { color: #88ff88; }
    .impulse    { color: #ffaa44; }
    .trait      { color: #44aaff; }
    .event      { color: #ff4444; font-weight: bold; }
    .system     { color: #00ff88; }
    .decay      { color: #666666; }
    .response   { color: #ffffff; }
  </style>
</head>
<body>
  <div id="stats">
    Energy: <span id="energy">100</span> | 
    Diversity: <span id="diversity">0</span> | 
    Stability: <span id="stability">100</span>
  </div>

  <div id="terminal">
    <div id="output">
      <div class="system">🌌 WORLD-BOX NEURAL MIND v3.0</div>
      <div class="system">Neural ecosystem simulation active. Population: 16 thoughtforms.</div>
    </div>
    <div id="input-line">
      <span id="prompt">mind&gt;</span>
      <input id="input" type="text" autocomplete="off" autofocus>
    </div>
  </div>
 <canvas id="brain" width="800" height="500"></canvas>
<div id="output"></div>

<script>

class BrainMind {

constructor(){

this.population=[]
this.workspace=[]
this.longTerm=[]

this.neuro={
dopamine:0.5,
serotonin:0.5
}

this.canvas=document.getElementById("brain")
this.ctx=this.canvas.getContext("2d")

this.initPopulation()

this.loop()

}

initPopulation(){

const types=["logic","emotion","memory","curiosity"]

for(let i=0;i<25;i++){

this.population.push({
id:i,
type:types[i%4],
energy:5+Math.random()*10,
prediction:Math.random(),
error:0,
value:Math.random(),
age:0,

x:Math.random()*this.canvas.width,
y:Math.random()*this.canvas.height,

links:[]
})

}

this.population.forEach(t=>{

for(let i=0;i<3;i++){

t.links.push({
target:Math.floor(Math.random()*this.population.length),
weight:0.5+Math.random()*0.5
})

}

})

}

predict(){

const stimulus=Math.random()

this.population.forEach(t=>{

t.error=Math.abs(stimulus-t.prediction)

t.prediction+=0.1*(stimulus-t.prediction)

t.energy+=t.error*2

})

}

attention(){

this.workspace=this.population
.sort((a,b)=>b.energy-a.energy)
.slice(0,5)

}

broadcast(){

this.workspace.forEach(t=>{

t.links.forEach(l=>{

const target=this.population[l.target]

if(!target) return

target.energy+=l.weight*1.5

})

})

}

reinforce(){

this.workspace.forEach(t=>{

const reward=Math.random()

if(reward>0.75){

this.neuro.dopamine+=0.02

t.links.forEach(l=>{
l.weight*=1.05
})

}

})

}

memory(){

this.workspace.forEach(t=>{

if(t.energy>15){

this.longTerm.push({...t})

}

})

}

decay(){

this.population.forEach(t=>{

t.energy*=0.96
t.age++

})

}

stimulus(){

if(Math.random()<0.2){

const target=this.population[
Math.floor(Math.random()*this.population.length)
]

target.energy+=5

print("stimulus triggered → "+target.type)

}

}

express(){

const top=this.workspace[0]

if(!top) return

print("conscious thought → "+top.type+" | error "+top.error.toFixed(2))

}

updateBrain(){

const ctx=this.ctx

ctx.clearRect(0,0,this.canvas.width,this.canvas.height)

this.population.forEach(t=>{

t.links.forEach(l=>{

const target=this.population[l.target]

if(!target) return

ctx.beginPath()

ctx.moveTo(t.x,t.y)
ctx.lineTo(target.x,target.y)

ctx.strokeStyle="rgba(0,255,150,"+(l.weight*0.3)+")"

ctx.stroke()

})

})

this.population.forEach(t=>{

let r=3+t.energy*0.3

if(this.workspace.includes(t)) r+=6

ctx.beginPath()

ctx.arc(t.x,t.y,r,0,Math.PI*2)

ctx.fillStyle=this.workspace.includes(t)?
"#00ffaa":
"#00ff88"

ctx.fill()

})

}

loop(){

this.predict()

this.stimulus()

this.attention()

this.broadcast()

this.reinforce()

this.memory()

this.decay()

this.updateBrain()

this.express()

setTimeout(()=>this.loop(),1200)

}

}

const output=document.getElementById("output")

function print(text){

const d=document.createElement("div")

d.textContent=text

output.appendChild(d)

output.scrollTop=output.scrollHeight

}

const brain=new BrainMind()

</script>

</body>
</html>
