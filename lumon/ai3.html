<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Bank Terminal Simulator</title>

<style>
body{
background:#000;
color:#00ff9c;
font-family:monospace;
margin:0;
padding:0;
}

#terminal{
padding:15px;
height:100vh;
overflow-y:auto;
}

.line{
margin:4px 0;
}

.input-line{
display:flex;
}

.prompt{
margin-right:8px;
}

input{
background:none;
border:none;
outline:none;
color:#00ff9c;
font-family:monospace;
font-size:16px;
width:100%;
}

.stat{
color:#7dffcc;
}

.warn{
color:#ffcc00;
}

.bad{
color:#ff5555;
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>

const terminal = document.getElementById("terminal")

let state = {
year:1,
interest:2.0,
inflation:2.0,
gdp:100,
unemployment:5,
currency:100,
money:1000
}

function print(text,cls=""){
let div=document.createElement("div")
div.className="line "+cls
div.innerHTML=text
terminal.appendChild(div)
terminal.scrollTop=terminal.scrollHeight
}

function newInput(){

let line=document.createElement("div")
line.className="input-line"

let prompt=document.createElement("span")
prompt.className="prompt"
prompt.innerText="CB>"

let input=document.createElement("input")

line.appendChild(prompt)
line.appendChild(input)

terminal.appendChild(line)
input.focus()

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
let cmd=input.value
input.disabled=true
handleCommand(cmd)
}
})
}

function help(){

print("COMMANDS")
print("help - show commands")
print("status - view economy")
print("rate <number> - set interest rate")
print("print <amount> - print money")
print("bonds <amount> - sell bonds")
print("next - advance year")
print("reset - restart simulation")

}

function status(){

print("YEAR: "+state.year,"stat")
print("Interest Rate: "+state.interest+"%","stat")
print("Inflation: "+state.inflation.toFixed(2)+"%","stat")
print("GDP Index: "+state.gdp.toFixed(2),"stat")
print("Unemployment: "+state.unemployment.toFixed(2)+"%","stat")
print("Currency Strength: "+state.currency.toFixed(2),"stat")
print("Money Supply: "+state.money.toFixed(0),"stat")

}

function nextYear(){

state.year++

let rateEffect = state.interest - 2

state.inflation += (state.money/1000 - 1)*0.5
state.inflation -= rateEffect*0.3

state.gdp += 2 - state.interest*0.2

state.unemployment += state.interest*0.15 - 0.3

state.currency += state.interest*0.8 - state.inflation*0.6

clamp()

print("Year advanced.","warn")

randomEvents()

status()

}

function clamp(){

state.inflation=Math.max(-5,Math.min(20,state.inflation))
state.unemployment=Math.max(1,Math.min(25,state.unemployment))
state.currency=Math.max(20,Math.min(200,state.currency))
state.gdp=Math.max(40,Math.min(300,state.gdp))

}

function randomEvents(){

let r=Math.random()

if(r<0.15){
state.inflation+=2
print("⚠ Supply shock increased inflation.","bad")
}

else if(r<0.30){
state.gdp+=5
print("Tech boom boosted GDP.","stat")
}

else if(r<0.40){
state.unemployment+=2
print("Recession fears increased unemployment.","bad")
}

}

function handleCommand(cmd){

let parts=cmd.trim().split(" ")

switch(parts[0]){

case "help":
help()
break

case "status":
status()
break

case "rate":

let r=parseFloat(parts[1])

if(isNaN(r)){
print("Enter a valid rate.","bad")
break
}

state.interest=r
print("Interest rate set to "+r+"%")
break

case "print":

let p=parseFloat(parts[1])

if(isNaN(p)){
print("Enter amount.","bad")
break
}

state.money+=p
state.inflation+=p/500

print("Printed "+p+" money.","warn")

break

case "bonds":

let b=parseFloat(parts[1])

if(isNaN(b)){
print("Enter amount.","bad")
break
}

state.money-=b
state.currency+=b/50

print("Sold "+b+" in bonds.")

break

case "next":
nextYear()
break

case "reset":
location.reload()
break

default:
print("Unknown command. Type 'help'.","bad")

}

newInput()

}

print("CENTRAL BANK TERMINAL SIMULATOR")
print("Type 'help' to begin.")

newInput()

</script>

</body>
</html>
