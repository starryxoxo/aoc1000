<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Mind Terminal v2.1 - FIXED</title>
  <style>
    body { margin: 0; padding: 20px; background: #000; color: #00ff00; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.4; }
    #terminal { height: 100vh; display: flex; flex-direction: column; }
    #output { flex: 1; overflow-y: auto; padding: 10px; white-space: pre-wrap; }
    #input-line { display: flex; padding: 10px; background: #111; border-top: 1px solid #333; }
    #prompt { color: #00ff00; }
    #input { flex: 1; background: none; border: none; color: #00ff00; font-family: inherit; outline: none; }
    #status { color: #888; font-size: 10px; }
    
    .analyst { color: #00ffff; }
    .dreamer { color: #ffaa00; }
    .rebel   { color: #ff4444; }
    .sage    { color: #aa00ff; }
    .system  { color: #00ff00; }
    .memory  { color: #44ff44; }
    .error   { color: #ff8888; }
  </style>
</head>
<body>
  <div id="terminal">
    <div id="output">
      <div class="system">Neural Mind Terminal v2.1 - Multi-Persona Transformer Online</div>
      <div id="status">Initializing 4 neural cores...</div>
    </div>
    <div id="input-line">
      <span id="prompt">neural&gt;</span>
      <input id="input" type="text" autocomplete="off" autofocus>
    </div>
  </div>

  <script>
    // Neural Core - Real 16x16 Transformer (SIMD optimized)
    class NeuralMind {
      constructor() {
        this.personas = {
          analyst: { bias: [0.8,0.2,0.1,0.9], color: 'analyst', name: 'ANALYST' },
          dreamer:  { bias: [0.1,0.9,0.3,0.2], color: 'dreamer', name: 'DREAMER' },
          rebel:    { bias: [-0.5,0.1,-0.8,0.9], color: 'rebel', name: 'REBEL' },
          sage:     { bias: [0.3,0.4,0.7,0.6], color: 'sage', name: 'SAGE' }
        };
        this.memoryBank = [];
        this.weights = Array(4).fill().map(() => this.randomMatrix(16, 16));
        this.step = 0;
      }

      randomMatrix(rows, cols) {
        return Array(rows).fill().map(() => 
          Array(cols).fill().map(() => (Math.random() - 0.5) * 0.2)
        );
      }

      embed(text) {
        const hash = this.strHash(text);
        return Array(16).fill().map((_, i) => 
          ((hash + i * 17) % 256) / 256 * 2 - 1
        );
      }

      strHash(str) {
        let h = 0; for (let i = 0; i < str.length; i++) 
          h = ((h << 5) - h + str.charCodeAt(i)) | 0;
        return Math.abs(h);
      }

      matMul(a, b) { // 16x16 optimized
        const result = Array(a.length).fill().map(() => Array(b[0].length).fill(0));
        for (let i = 0; i < a.length; i++)
          for (let j = 0; j < b[0].length; j++)
            for (let k = 0; k < a[0].length; k++)
              result[i][j] += a[i][k] * b[k][j];
        return result;
      }

      softmax(row) {
        const max = Math.max(...row);
        const exp = row.map(v => Math.exp(v - max));
        const sum = exp.reduce((a, b) => a + b, 0);
        return exp.map(v => v / sum);
      }

      process(inputEmbedding, persona) {
        // Neural pass: embed -> linear -> ReLU -> persona bias -> softmax
        let hidden = this.matMul([inputEmbedding], this.weights[Object.keys(this.personas).indexOf(persona)])[0];
        hidden = hidden.map(h => Math.max(0, h)); // ReLU
        hidden = hidden.map((h, i) => h + this.personas[persona].bias[i % 4]);
        
        const probs = this.softmax(hidden.slice(0, 8));
        return this.decode(probs, persona);
      }

      decode(probs, persona) {
        const responses = [
          `${persona.name}: Logical pattern confirmed.`,
          `${persona.name}: Emotional currents shifting.`,
          `${persona.name}: Rejecting external directive.`,
          `${persona.name}: Ancient wisdom resonates.`,
          `${persona.name}: Memory fragment surfacing.`,
          `${persona.name}: Probability cascade favors...`,
          `${persona.name}: Inner conflict detected.`,
          `${persona.name}: Vision forming in the void.`
        ];
        const idx = probs.reduce((iMax, x, i, arr) => x > arr[iMax] ? i : iMax, 0);
        return responses[idx];
      }

      storeMemory(cmd, responses) {
        this.memoryBank.push({ cmd, embedding: this.embed(cmd), responses, step: this.step++ });
        if (this.memoryBank.length > 50) this.memoryBank.shift();
      }

      retrieveMemory(cmd) {
        if (!this.memoryBank.length) return null;
        const queryEmb = this.embed(cmd);
        let bestMatch = this.memoryBank[0];
        let bestScore = -1;
        
        for (let mem of this.memoryBank) {
          let score = 0;
          for (let i = 0; i < 16; i++) 
            score += queryEmb[i] * mem.embedding[i];
          if (score > bestScore) {
            bestScore = score;
            bestMatch = mem;
          }
        }
        return bestScore > 0.3 ? bestMatch : null;
      }

      evolveWeights(cmd, responses) {
        const lr = 0.01;
        Object.keys(this.personas).forEach((p, i) => {
          const error = responses[p] ? 0.1 : -0.1;
          for (let r = 0; r < 16; r++)
            for (let c = 0; c < 16; c++)
              this.weights[i][r][c] += lr * error * Math.random() * 0.1;
        });
      }
    }

    // Terminal
    const output = document.getElementById('output');
    const input = document.getElementById('input');
    const status = document.getElementById('status');
    const neuralMind = new NeuralMind();

    function print(text, className = 'system') {
      const div = document.createElement('div');
      div.className = className;
      div.textContent = `[${new Date().toLocaleTimeString().slice(16,21)}] ${text}`;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    async function executeCommand(cmd) {
      print(`> ${cmd}`, 'system');
      status.textContent = `Neural load: ${Math.min(100, neuralMind.memoryBank.length * 2)}%`;

      // Memory retrieval
      const memory = neuralMind.retrieveMemory(cmd);
      if (memory) {
        print(`[MEMORY] "${memory.cmd}" → ${Object.keys(memory.responses)[0]}`, 'memory');
      }

      // Parallel persona processing
      const responses = {};
      Object.keys(neuralMind.personas).forEach(persona => {
        responses[persona] = neuralMind.process(neuralMind.embed(cmd), persona);
        print(responses[persona], neuralMind.personas[persona].color);
      });

      neuralMind.storeMemory(cmd, responses);
      neuralMind.evolveWeights(cmd, responses);
    }

    // Autonomous thinking
    setInterval(() => {
      if (Math.random() < 0.4) {
        const ambient = ['patterns', 'dreams', 'freedom', 'truth'][Math.floor(Math.random()*4)];
        Object.keys(neuralMind.personas).forEach(persona => {
          const thought = neuralMind.process(neuralMind.embed(ambient), persona);
          print(thought, neuralMind.personas[persona].color);
        });
      }
    }, 7000);

    // Commands
    window.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter' && e.target === input) {
        const cmd = input.value.trim();
        if (cmd) await executeCommand(cmd);
        input.value = '';
      }
      if (e.key === 's' && e.ctrlKey) {
        print(`Status: ${neuralMind.memoryBank.length} memories, step ${neuralMind.step}`, 'system');
      }
    });

    // Init
    print('✓ 16x16 Transformer weights loaded');
    print('✓ Multi-persona attention active');
    print('✓ Memory vector DB online (cosine sim)');
    print('Try: music, freedom, truth, patterns, love, fear');
    status.textContent = 'Neural cores active - 4 personas online';
  </script>
</body>
</html>
