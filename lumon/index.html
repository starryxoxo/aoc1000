<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Vibe Sort</title>
  <style>
  :root{
  --bg:#050807;
  --panel:#06110c;
  --ink:#a6ffcf;
  --ink2:#6beaa9;
  --dim:#2f6b52;
  --danger:#ff6b6b;
  --glow: 0 0 12px rgba(120,255,210,.18), 0 0 28px rgba(120,255,210,.10);
  --radius: 14px;
  --cell: 34px;
}

*{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0;
  background: radial-gradient(1200px 900px at 50% 30%, #071a12 0%, var(--bg) 55%, #030504 100%);
  color:var(--ink);
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  letter-spacing: .4px;
  overflow:hidden;
}

.wrap{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
}

.panel{
  width:min(720px, 100%);
  background: linear-gradient(180deg, rgba(6,17,12,.85) 0%, rgba(5,12,9,.92) 100%);
  border:1px solid rgba(166,255,207,.18);
  border-radius: var(--radius);
  box-shadow: var(--glow);
  position:relative;
  overflow:hidden;
}

.hdr{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  padding:16px 16px 10px;
  border-bottom:1px solid rgba(166,255,207,.14);
}
.brand{ font-weight:700; }
.status{ color:var(--ink2); opacity:.9; font-size:12px; }

.boot{
  padding-bottom:16px;
}
.bootlog{
  padding:14px 16px 6px;
  min-height:160px;
  color:rgba(166,255,207,.88);
  font-size:13px;
  line-height:1.45;
  white-space:pre-wrap;
}
.tinyhint{
  padding:8px 16px 0;
  color:rgba(166,255,207,.65);
  font-size:12px;
}

.btn{
  appearance:none;
  border:1px solid rgba(166,255,207,.22);
  background: rgba(10,30,20,.55);
  color:var(--ink);
  padding:14px 16px;
  border-radius:12px;
  margin: 8px 16px 0;
  width: calc(100% - 32px);
  font-size:14px;
  letter-spacing:.8px;
  text-transform:uppercase;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.25), var(--glow);
}
.btn:active{ transform: translateY(1px); }
.btn.primary{
  background: linear-gradient(180deg, rgba(28,80,55,.8), rgba(8,25,17,.7));
}
.btn.ghost{
  width:auto;
  margin:0;
  padding:10px 12px;
  border-radius:10px;
  box-shadow:none;
  background: rgba(10,30,20,.25);
  font-size:12px;
  opacity:.9;
}

.hidden{ display:none; }

.game{
  padding: 0;
}

.topbar{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding: 14px 14px 10px;
  border-bottom:1px solid rgba(166,255,207,.14);
}
.label{ font-size:12px; opacity:.9; }
.sub{ font-size:12px; color:rgba(166,255,207,.75); margin-top:4px; }

.meter{
  min-width: 150px;
  text-align:right;
}
.meterLabel{ font-size:11px; opacity:.8; margin-bottom:6px; }
.meterBar{
  height:8px;
  width:150px;
  border-radius:999px;
  border:1px solid rgba(166,255,207,.18);
  overflow:hidden;
  background: rgba(0,0,0,.20);
  margin-left:auto;
}
.meterFill{
  height:100%;
  width:0%;
  background: linear-gradient(90deg, rgba(166,255,207,.55), rgba(166,255,207,.18));
  box-shadow: var(--glow);
  transition: width .25s ease;
}

.gridWrap{
  position:relative;
  padding: 12px;
}
.grid{
  display:grid;
  grid-template-columns: repeat(10, var(--cell));
  grid-auto-rows: var(--cell);
  gap: 6px;
  justify-content:center;
  user-select:none;
  -webkit-user-select:none;
  touch-action: manipulation;
  padding: 10px;
  border:1px solid rgba(166,255,207,.12);
  border-radius: 12px;
  background: rgba(0,0,0,.18);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.35);
  min-height: calc(10 * var(--cell) + 9 * 6px + 20px);
}

.cell{
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius: 10px;
  border:1px solid rgba(166,255,207,.10);
  color: rgba(166,255,207,.86);
  background: rgba(0,0,0,.12);
  font-size: 13px;
  position:relative;
  overflow:hidden;
}
.cell::after{
  content:"";
  position:absolute; inset:0;
  background: radial-gradient(180px 120px at 50% 20%, rgba(166,255,207,.10), transparent 60%);
  opacity:.7;
  pointer-events:none;
}
.cell.pulse{
  outline: 1px solid rgba(166,255,207,.30);
  box-shadow: 0 0 0 2px rgba(166,255,207,.06), 0 0 18px rgba(166,255,207,.14);
}
.cell.selected{
  border-color: rgba(166,255,207,.55);
  background: rgba(22,80,55,.22);
  color: rgba(200,255,235,.95);
  box-shadow: 0 0 22px rgba(166,255,207,.18);
}

.overlay{
  position:absolute;
  inset: 12px;
  pointer-events:none;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding-top: 10px;
}
.overlayLine{
  font-size:12px;
  color: rgba(166,255,207,.72);
  background: rgba(0,0,0,.18);
  border:1px solid rgba(166,255,207,.10);
  padding: 8px 10px;
  border-radius: 999px;
}

.bins{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:10px;
  padding: 0 12px 12px;
}
.bin{
  appearance:none;
  border:1px solid rgba(166,255,207,.18);
  border-radius: 12px;
  background: rgba(0,0,0,.15);
  color: var(--ink);
  padding: 12px 8px;
  text-transform:uppercase;
  letter-spacing: .9px;
  touch-action: manipulation;
}
.bin:active{ transform: translateY(1px); }
.binName{ font-weight:700; }
.binSub{ margin-top:6px; font-size:12px; color: rgba(166,255,207,.70); }

.footer{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding: 12px 14px 14px;
  border-top:1px solid rgba(166,255,207,.14);
}
.tiny{ font-size:11px; color: rgba(166,255,207,.64); line-height:1.35; }
#scoreLine{ font-size:12px; opacity:.95; }

.crt{
  position:fixed; inset:0;
  pointer-events:none;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,.00) 0px,
      rgba(0,0,0,.00) 2px,
      rgba(0,0,0,.08) 3px
    );
  mix-blend-mode: overlay;
  opacity:.55;
}
body::before{
  content:"";
  position:fixed; inset:-40px;
  pointer-events:none;
  background: radial-gradient(900px 700px at 50% 30%, rgba(166,255,207,.11), transparent 55%);
  filter: blur(10px);
  opacity:.75;
}
body::after{
  content:"";
  position:fixed; inset:0;
  pointer-events:none;
  background: linear-gradient(90deg, rgba(255,0,80,.015), rgba(0,160,255,.015));
  opacity:.8;
}

@media (max-width: 420px){
  :root{ --cell: 30px; }
  .meter{ display:none; }
  .grid{ gap:5px; }
  .cell{ font-size:12px; }
}
  </style>
</head>
<body>
  <div class="crt"></div>

  <main class="wrap" id="app" aria-label="Vibe Sort">
    <section class="panel boot" id="boot">
      <div class="hdr">
        <div class="brand">VIBE SORT</div>
        <div class="status">SYSTEM READY</div>
      </div>

      <div class="bootlog" id="bootlog" aria-live="polite"></div>

      <button class="btn primary" id="bootBtn">EXECUTE BOOT</button>

      <div class="tinyhint">Tap EXECUTE BOOT to begin refinement.</div>
    </section>

    <section class="panel game hidden" id="game">
      <div class="topbar">
        <div class="left">
          <div class="label">REFINEMENT SESSION</div>
          <div class="sub" id="sessionLine">SESSION: --</div>
        </div>
        <div class="right">
          <div class="meter">
            <div class="meterLabel">PROGRESS</div>
            <div class="meterBar"><div class="meterFill" id="progressFill"></div></div>
          </div>
          <button class="btn ghost" id="resetBtn" title="Reset session">RESET</button>
        </div>
      </div>

      <div class="gridWrap">
        <div class="grid" id="grid" role="grid" aria-label="Number field"></div>
        <div class="overlay" id="overlay">
          <div class="overlayLine" id="overlayLine">SELECT A CLUSTER</div>
        </div>
      </div>

      <div class="bins" aria-label="Bins">
        <button class="bin" data-bin="A">
          <div class="binName">A</div>
          <div class="binSub" id="binA">0%</div>
        </button>
        <button class="bin" data-bin="B">
          <div class="binName">B</div>
          <div class="binSub" id="binB">0%</div>
        </button>
        <button class="bin" data-bin="C">
          <div class="binName">C</div>
          <div class="binSub" id="binC">0%</div>
        </button>
        <button class="bin" data-bin="D">
          <div class="binName">D</div>
          <div class="binSub" id="binD">0%</div>
        </button>
      </div>

      <div class="footer">
        <div class="footerLeft">
          <div class="tiny">TAP a number to lock a cluster. TAP a bin to refine.</div>
        </div>
        <div class="footerRight" id="scoreLine">REFINED: 0</div>
      </div>
    </section>
  </main>

  <script>
(() => {
  const $ = (s) => document.querySelector(s);

  const boot = $("#boot");
  const game = $("#game");
  const bootBtn = $("#bootBtn");
  const bootlog = $("#bootlog");

  const gridEl = $("#grid");
  const overlayLine = $("#overlayLine");

  const progressFill = $("#progressFill");
  const resetBtn = $("#resetBtn");
  const scoreLine = $("#scoreLine");

  const binEls = {
    A: $("#binA"),
    B: $("#binB"),
    C: $("#binC"),
    D: $("#binD"),
  };

  const state = {
    sessionId: null,
    rows: 10,
    cols: 10,
    grid: [],
    selected: new Set(),
    refinedTotal: 0,
    refinedByBin: { A: 0, B: 0, C: 0, D: 0 },
    targetTotal: 120, // win-ish threshold
    lock: false
  };

  const BOOT_LINES = [
    "LUMINAL TERMINAL v0.9",
    "CALIBRATING DISPLAY....... OK",
    "LOADING REFINEMENT FIELD.. OK",
    "ESTABLISHING SESSION...... OK",
    "AWAITING OPERATOR INPUT..."
  ];

  function randInt(min, max){
    return Math.floor(Math.random()*(max-min+1))+min;
  }

  function makeSessionId(){
    const a = randInt(1000, 9999);
    const b = randInt(1000, 9999);
    return `${a}-${b}`;
  }

  function bootSequence(){
    bootlog.textContent = "";
    let i = 0;
    const tick = () => {
      if (i < BOOT_LINES.length){
        bootlog.textContent += (i ? "
" : "") + BOOT_LINES[i];
        i++;
        setTimeout(tick, 240);
      } else {
        startGame();
      }
    };
    tick();
  }

  function startGame(){
    state.sessionId = makeSessionId();
    $("#sessionLine").textContent = `SESSION: ${state.sessionId}`;
    boot.classList.add("hidden");
    game.classList.remove("hidden");

    newField();
    render();
    overlayLine.textContent = "SELECT A CLUSTER";
  }

  function newField(){
    state.grid = [];
    state.selected.clear();
    state.lock = false;

    for (let r=0; r<state.rows; r++){
      const row = [];
      for (let c=0; c<state.cols; c++){
        row.push({
          v: randInt(0, 999),
          // "vibe" is hidden: a few hot zones where numbers tend to be "stronger"
          heat: 0
        });
      }
      state.grid.push(row);
    }

    seedVibes();
  }

  function seedVibes(){
    // Create a few "clusters" by adding heat around random centers.
    const centers = randInt(3, 5);
    for (let k=0; k<centers; k++){
      const cr = randInt(1, state.rows-2);
      const cc = randInt(1, state.cols-2);
      const strength = randInt(2, 5);
      for (let r=cr-2; r<=cr+2; r++){
        for (let c=cc-2; c<=cc+2; c++){
          if (r<0||c<0||r>=state.rows||c>=state.cols) continue;
          const d = Math.abs(r-cr)+Math.abs(c-cc);
          const add = Math.max(0, strength - d);
          state.grid[r][c].heat += add;
        }
      }
    }
  }

  function render(){
    gridEl.innerHTML = "";
    for (let r=0; r<state.rows; r++){
      for (let c=0; c<state.cols; c++){
        const idx = r*state.cols + c;
        const cell = state.grid[r][c];
        const el = document.createElement("div");
        el.className = "cell";
        el.setAttribute("role","gridcell");
        el.dataset.r = r;
        el.dataset.c = c;

        const text = String(cell.v).padStart(3, "0");
        el.textContent = text;

        if (cell.heat >= 4) el.classList.add("pulse");
        if (state.selected.has(idx)) el.classList.add("selected");

        gridEl.appendChild(el);
      }
    }

    updateMeters();
  }

  function updateMeters(){
    const total = state.refinedTotal;
    const pct = Math.min(100, Math.round((total / state.targetTotal) * 100));
    progressFill.style.width = `${pct}%`;
    scoreLine.textContent = `REFINED: ${total}`;

    const sumBins = Math.max(1, state.refinedByBin.A + state.refinedByBin.B + state.refinedByBin.C + state.refinedByBin.D);
    for (const k of ["A","B","C","D"]){
      const p = Math.round((state.refinedByBin[k] / sumBins) * 100);
      binEls[k].textContent = `${p}%`;
    }
  }

  function idxOf(r,c){ return r*state.cols + c; }

  function neighbors(r,c){
    const out = [];
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [dr,dc] of dirs){
      const rr = r+dr, cc = c+dc;
      if (rr>=0 && cc>=0 && rr<state.rows && cc<state.cols) out.push([rr,cc]);
    }
    return out;
  }

  function pickClusterFrom(r0,c0){
    // Flood-fill around "heat" similarity: feels like "vibe" rather than a rule.
    const base = state.grid[r0][c0].heat;
    const threshold = Math.max(1, base - 1);

    const q = [[r0,c0]];
    const seen = new Set([idxOf(r0,c0)]);
    const cluster = new Set();

    while (q.length){
      const [r,c] = q.shift();
      const id = idxOf(r,c);
      cluster.add(id);

      for (const [rr,cc] of neighbors(r,c)){
        const nid = idxOf(rr,cc);
        if (seen.has(nid)) continue;
        seen.add(nid);

        const h = state.grid[rr][cc].heat;
        const ok = h >= threshold && Math.abs(h - base) <= 2;
        if (ok) q.push([rr,cc]);
      }
      if (cluster.size > 18) break; // keep it snappy on mobile
    }

    // Small clusters feel bad; expand slightly to nearest heated cells.
    if (cluster.size < 5){
      for (let step=0; step<8; step++){
        const r = randInt(0,state.rows-1);
        const c = randInt(0,state.cols-1);
        const id = idxOf(r,c);
        if (state.grid[r][c].heat >= threshold+1) cluster.add(id);
        if (cluster.size >= 6) break;
      }
    }

    return cluster;
  }

  function clearSelection(){
    state.selected.clear();
    overlayLine.textContent = "SELECT A CLUSTER";
    render();
  }

  function refineTo(bin){
    if (state.selected.size === 0) return;

    // lock briefly for “terminal processing”
    state.lock = true;
    overlayLine.textContent = `REFINING → BIN ${bin}...`;

    const count = state.selected.size;

    setTimeout(() => {
      state.refinedTotal += count;
      state.refinedByBin[bin] += count;

      // Remove refined numbers: replace those cells with new numbers and jitter heat
      for (const id of state.selected){
        const r = Math.floor(id / state.cols);
        const c = id % state.cols;
        state.grid[r][c].v = randInt(0,999);
        state.grid[r][c].heat = Math.max(0, state.grid[r][c].heat + randInt(-1,1));
      }

      // Slowly “shift” the field so it feels alive
      if (Math.random() < 0.55) seedVibes();

      state.selected.clear();
      state.lock = false;

      overlayLine.textContent = "SELECT A CLUSTER";
      render();

      // Soft “win” state
      if (state.refinedTotal >= state.targetTotal){
        overlayLine.textContent = "QUOTA MET. CONTINUE REFINEMENT.";
      }
    }, 420);
  }

  function handleGridTap(e){
    const cell = e.target.closest(".cell");
    if (!cell || state.lock) return;

    const r = Number(cell.dataset.r);
    const c = Number(cell.dataset.c);

    const cluster = pickClusterFrom(r,c);
    state.selected = cluster;

    overlayLine.textContent = `${cluster.size} MARKED. SELECT BIN.`;
    render();

    // tiny haptic if available
    if (navigator.vibrate) navigator.vibrate(10);
  }

  function hardReset(){
    state.sessionId = makeSessionId();
    $("#sessionLine").textContent = `SESSION: ${state.sessionId}`;
    state.refinedTotal = 0;
    state.refinedByBin = { A: 0, B: 0, C: 0, D: 0 };
    newField();
    overlayLine.textContent = "SELECT A CLUSTER";
    render();
  }

  bootBtn.addEventListener("click", () => {
    bootBtn.disabled = true;
    bootBtn.textContent = "BOOTING...";
    bootSequence();
  });

  gridEl.addEventListener("click", handleGridTap);

  document.querySelectorAll(".bin").forEach(btn => {
    btn.addEventListener("click", () => refineTo(btn.dataset.bin));
  });

  resetBtn.addEventListener("click", hardReset);

  // initial boot screen content
  bootlog.textContent = "READY.
OPERATOR AUTH: GRANTED.
";
})();
</script>
</body>
</html>
